<!DOCTYPE html>
<html>
<head>
<title>Royal Cabz</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#2193b0,#6dd5ed);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.container{
  width:90%;
  max-width:350px;
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:16px;
}

/* Trip Toggle */
.trip-type{
  display:flex;
  gap:10px;
  margin:15px 0;
}

.toggle{
  flex:1;
  padding:10px;
  text-align:center;
  border:2px solid #ddd;
  border-radius:8px;
  cursor:pointer;
  background:#f9f9f9;
}

.toggle.active{
  background:#2193b0;
  color:white;
  border-color:#2193b0;
}

/* Cab Selection */
.cabs{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.cab{
  width:30%;
  padding:10px;
  text-align:center;
  border:2px solid #ddd;
  border-radius:8px;
  cursor:pointer;
  position:relative;
}

.cab.selected{
  border-color:#2193b0;
  background:#eaf7fb;
}

.cab img{
  width:60px;
}

/* Tick */
.tick{
  position:absolute;
  top:5px;
  right:5px;
  background:#2193b0;
  color:white;
  border-radius:50%;
  width:20px;
  height:20px;
  display:none;
  align-items:center;
  justify-content:center;
}

.cab.selected .tick{
  display:flex;
}

button{
  width:100%;
  padding:12px;
  background:#2193b0;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  margin-top:15px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Royal Cabz 🚕</h2>

<!-- Trip Type -->
<div class="trip-type">
  <div class="toggle active" onclick="selectTrip(this, 'Airport')">Airport</div>
  <div class="toggle" onclick="selectTrip(this, 'One Way')">One Way</div>
  <div class="toggle" onclick="selectTrip(this, 'Round Trip')">Round Trip</div>
</div>

<input type="text" id="name" placeholder="Your Name">
<input type="tel" id="phone" placeholder="Phone Number">
<input type="text" id="pickup" placeholder="Pickup Location">
<input type="text" id="drop" placeholder="Drop Location">

<!-- Cab Selection -->
<div class="cabs">

  <div class="cab selected" onclick="selectCab(this, 'Mini')">
    <div class="tick">✓</div>
    <img src="https://img.icons8.com/color/96/car.png">
    <p>Mini</p>
  </div>

  <div class="cab" onclick="selectCab(this, 'Sedan')">
    <div class="tick">✓</div>
    <img src="https://img.icons8.com/color/96/sedan.png">
    <p>Sedan</p>
  </div>

  <div class="cab" onclick="selectCab(this, 'SUV')">
    <div class="tick">✓</div>
    <img src="https://img.icons8.com/color/96/suv.png">
    <p>SUV</p>
  </div>

</div>

<button onclick="bookCab()">Book via WhatsApp</button>

</div>

<script>

var selectedCab = "Mini";
var selectedTrip = "Airport";

/* Select Cab */
function selectCab(element, cabType){
  selectedCab = cabType;

  document.querySelectorAll(".cab").forEach(c =>
    c.classList.remove("selected")
  );

  element.classList.add("selected");
}

/* Select Trip */
function selectTrip(element, tripType){
  selectedTrip = tripType;

  document.querySelectorAll(".toggle").forEach(t =>
    t.classList.remove("active")
  );

  element.classList.add("active");
}

/* Booking */
function bookCab(){

  var name = document.getElementById("name").value.trim();
  var phone = document.getElementById("phone").value.trim();
  var pickup = document.getElementById("pickup").value.trim();
  var drop = document.getElementById("drop").value.trim();

  if(!name || !phone || !pickup || !drop){
    alert("Please fill all details");
    return;
  }

  var message =
`🚕 Royal Cabz Booking
Trip Type: ${selectedTrip}
Name: ${name}
Phone: ${phone}
Pickup: ${pickup}
Drop: ${drop}
Cab Type: ${selectedCab}`;

  var whatsappNumber = "919488003687";

  var url = "https://wa.me/" + whatsappNumber + "?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}

</script>

</body>
</html>
